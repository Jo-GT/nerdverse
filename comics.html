    <style>
        :root {
            --marvel-red: #ec1d24;
            --dc-blue: #0476f2;
            --boys-red: #ff3e3e;
            --invincible-blue: #00a8ff;
            --image-purple: #00c787;
            --dark-horse: #4a1a1a;
        }

        .comics-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 120px 2rem 4rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            background: linear-gradient(135deg, var(--marvel-red), var(--dc-blue), var(--invincible-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Franchise Tabs */
        .franchise-tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .franchise-tab {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border: 2px solid var(--border);
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .franchise-tab:hover {
            transform: translateY(-2px);
        }

        .franchise-tab.active {
            border-color: var(--primary);
            background: rgba(255, 107, 53, 0.2);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
        }

        .franchise-tab[data-franchise="marvel"].active {
            border-color: var(--marvel-red);
            background: rgba(236, 29, 36, 0.2);
            box-shadow: 0 0 20px rgba(236, 29, 36, 0.3);
        }

        .franchise-tab[data-franchise="dc"].active {
            border-color: var(--dc-blue);
            background: rgba(4, 118, 242, 0.2);
            box-shadow: 0 0 20px rgba(4, 118, 242, 0.3);
        }

        .franchise-tab[data-franchise="theboys"].active {
            border-color: var(--boys-red);
            background: rgba(255, 62, 62, 0.2);
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.3);
        }

        .franchise-tab[data-franchise="invincible"].active {
            border-color: var(--invincible-blue);
            background: rgba(0, 168, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 168, 255, 0.3);
        }

        .franchise-tab[data-franchise="image"].active {
            border-color: var(--image-purple);
            background: rgba(0, 199, 135, 0.2);
            box-shadow: 0 0 20px rgba(0, 199, 135, 0.3);
        }

        .franchise-tab[data-franchise="indie"].active {
            border-color: var(--accent);
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        /* Character Filter */
        .character-filter {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .character-filter h3 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .character-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .character-chip {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .character-chip:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .character-chip.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Comics Grid */
        .comics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .comic-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .comic-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .comic-cover {
            height: 200px;
            background: linear-gradient(135deg, var(--surface-elevated), var(--surface));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bangers', cursive;
            font-size: 3rem;
            color: var(--border);
        }

        .comic-card[data-franchise="marvel"] .comic-cover {
            background: linear-gradient(135deg, #1a0a0a, #2d1515);
            color: var(--marvel-red);
        }

        .comic-card[data-franchise="dc"] .comic-cover {
            background: linear-gradient(135deg, #0a1a2d, #152d4a);
            color: var(--dc-blue);
        }

        .comic-card[data-franchise="theboys"] .comic-cover {
            background: linear-gradient(135deg, #2d0a0a, #4a1515);
            color: var(--boys-red);
        }

        .comic-card[data-franchise="invincible"] .comic-cover {
            background: linear-gradient(135deg, #0a1a2d, #152d4a);
            color: var(--invincible-blue);
        }

        .comic-card[data-franchise="image"] .comic-cover {
            background: linear-gradient(135deg, #0a2d1a, #154a2d);
            color: var(--image-purple);
        }

        .comic-card[data-franchise="indie"] .comic-cover {
            background: linear-gradient(135deg, #2d2d0a, #4a4a15);
            color: var(--accent);
        }

        .comic-info {
            padding: 1.25rem;
        }

        .comic-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .comic-issue {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .comic-characters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .character-tag {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            background: rgba(255, 107, 53, 0.1);
            border: 1px solid rgba(255, 107, 53, 0.3);
            border-radius: 4px;
            color: var(--primary);
        }

        .comic-description {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .comic-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .comic-meta span {
            color: var(--text-secondary);
        }

        .comic-meta span strong {
            color: var(--text-primary);
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .no-results h3 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 1rem;

        /* Responsive */
        @media (max-width: 768px) {
            .page-header h1 {

            }

            .franchise-tabs {
                gap: 0.25rem;
            }

            .franchise-tab {
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
            }

            .comics-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));

            dc: ["Batman", "Superman", "Wonder Woman", "Flash", "Green Lantern", "Harley Quinn", "Nightwing", "Aquaman", "Shazam", "Catwoman", "Joker", "Lex Luthor", "Sinestro", "Poison Ivy"],
            theboys: ["Homelander", "Butcher", "Hughie", "Starlight", "A-Train", "Queen Maeve", "Black Noir", "Soldier Boy", "Frenchie", "Mother's Milk"],
            invincible: ["Mark Grayson", "Omni-Man", "Atom Eve", "Rudy", "Tech Jacket", "Dupli-Kate", "Battle Beast", "Thragg", "Allen the Alien"],
            image: ["Spawn", "Walking Dead", "Saga", "Invincible", "Chew", "Paper Girls", "Descender", "Witch Doctor", "Black Science"],
            indie: ["Hellboy", "The Goon", "Locke & Key", "Y: The Last Man", "Fables", "Sandman", "Preacher", "Transmetropolitan", "Scalped", "Criminal"]
        };

        let currentFranchise = 'all';
        let selectedCharacters = [];
        let comicCoverCache = {};

        // Initialise
        async function init() {
            populateCharacterChips('all');
            await loadComicCovers();
            renderComics();
            setupEventListeners();
        }

        async function loadComicCovers() {
            await Promise.all(comicsDatabase.map(async comic => {
                if (comicCoverCache[comic.title]) return;

                comicCoverCache[comic.title] = { image: '', link: '' };
                try {
                    const response = await fetch(`/api/comics?q=${encodeURIComponent(comic.title)}`);
                    if (!response.ok) return;
                    const results = await response.json();
                    if (Array.isArray(results) && results.length > 0) {
                        const issue = results[0];
                        comicCoverCache[comic.title] = {
                            image: issue.image || '',
                            link: issue.site_detail_url || issue.api_detail_url || ''
                        };
                    }
                } catch (error) {
                    // Keep fallback behaviour if API call fails
                }
            }));
        }

        function openComicLink(url) {
            if (url) {
                window.open(url, '_blank', 'noopener');
            }
        }

        function populateCharacterChips(franchise) {
            const container = document.getElementById('character-chips');
            const characters = franchiseCharacters[franchise] || franchiseCharacters.all;
            
            container.innerHTML = characters.map(char => `
                <button class="character-chip" data-character="${char}">${char}</button>
            `).join('');

            // Add click listeners
            container.querySelectorAll('.character-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    chip.classList.toggle('active');
                    const char = chip.dataset.character;
                    if (selectedCharacters.includes(char)) {
                        selectedCharacters = selectedCharacters.filter(c => c !== char);
                    } else {
                        selectedCharacters.push(char);
                    }
                    renderComics();
                });
            });
        }

        function renderComics() {
            const grid = document.getElementById('comics-grid');
            let filtered = comicsDatabase;

            // Filter by franchise
            if (currentFranchise !== 'all') {
                filtered = filtered.filter(c => c.franchise === currentFranchise);
            }

            // Filter by characters
            if (selectedCharacters.length > 0) {
                filtered = filtered.filter(c => 
                    c.characters.some(char => 
                        selectedCharacters.some(selected => 
                            char.toLowerCase().includes(selected.toLowerCase()) ||
                            selected.toLowerCase().includes(char.toLowerCase())
                        )
                    )
                );
            }

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="no-results" style="grid-column: 1 / -1;">
                        <h3>No comics found</h3>
                        <p>Try adjusting your character filters</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map(comic => {
                const coverData = comicCoverCache[comic.title] || { image: '', link: '' };
                const coverImage = coverData.image ? `<img src="${escapeHtml(coverData.image)}" alt="${escapeHtml(comic.title)}" onerror="this.style.display='none'">` : `<div class="comic-icon">${comic.title.substring(0, 2).toUpperCase()}</div>`;
                const cardLink = coverData.link ? coverData.link : '';
                return `
                    <div class="comic-card" data-franchise="${comic.franchise}" ${cardLink ? `onclick="openComicLink('${escapeHtml(cardLink)}')"` : ''}>
                        <div class="comic-cover">${coverImage}</div>
                        <div class="comic-info">
                            <div class="comic-title">${comic.title}</div>
                            <div class="comic-issue">${comic.issue} (${comic.year})</div>
                            <div class="comic-characters">
                                ${comic.characters.slice(0, 4).map(c => `<span class="character-tag">${c}</span>`).join('')}
                            </div>
                            <div class="comic-description">${comic.description}</div>
                            <div class="comic-meta">
                                <span>Writer: <strong>${comic.writer}</strong></span>
                                <span>Artist: <strong>${comic.artist}</strong></span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setupEventListeners() {
            // Franchise tabs
            document.querySelectorAll('.franchise-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.franchise-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentFranchise = tab.dataset.franchise;
                    
                    // Reset character filters
                    selectedCharacters = [];
                    populateCharacterChips(currentFranchise);
                    renderComics();
                });
            });
        }

        // Initialise on load
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
