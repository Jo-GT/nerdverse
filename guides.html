<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guides - ComicHelper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="logo" onclick="navigateTo('index')">NerdVerse</div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html" data-page="home">Home</a></li>
            <li><a href="wiki.html" data-page="wiki">Wiki</a></li>
            <li><a href="guides.html" class="active" data-page="guides">Guides</a></li>
            <li><a href="marvel.html" data-page="marvel">Marvel</a></li>
            <li><a href="dcu.html" data-page="dcu">DCU</a></li>
            <li><a href="comics.html" data-page="comics">Comics</a></li>
        </ul>
        <div class="mobile-menu" onclick="toggleMobileMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="chat-container">
            <div class="chat-header">
                <h2>📖 Guide Assistant</h2>
                <p>Get help starting your comic journey!</p>
            </div>
            
            <!-- Quick Prompts -->
            <div class="quick-prompts">
                <button class="quick-prompt" onclick="setQuickPrompt('guides', 'How do I start reading comics?')">Getting Started</button>
                <button class="quick-prompt" onclick="setQuickPrompt('guides', 'What are the best Batman comics?')">Best Batman</button>
                <button class="quick-prompt" onclick="setQuickPrompt('guides', 'What order should I read Marvel events?')">Marvel Events</button>
                <button class="quick-prompt" onclick="setQuickPrompt('guides', 'Best comics for beginners?')">Beginner Comics</button>
            </div>
            
            <!-- Chat Messages -->
            <div class="chat-messages" id="guides-messages">
                <div class="message ai">
                    <p>👋 Hi! I'm your Comic Guide Assistant. Need help getting started or want to know the best comics to read? Just ask!</p>
                </div>
            </div>
            
            <!-- Chat Input -->
            <div class="chat-input">
                <input type="text" id="guides-input" placeholder="Ask for a guide or recommendation...">
                <button id="guides-send">Send</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>NerdVerse - Powered by <a href="https://ollama.com" target="_blank">Ollama</a></p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
