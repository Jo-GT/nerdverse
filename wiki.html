<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki - ComicHelper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="logo" onclick="navigateTo('index')">ComicHelper</div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html" data-page="home">Home</a></li>
            <li><a href="wiki.html" class="active" data-page="wiki">Wiki</a></li>
            <li><a href="guides.html" data-page="guides">Guides</a></li>
            <li><a href="recommendations.html" data-page="recommendations">Recommendations</a></li>
            <li><a href="personalized.html" data-page="personalized">Personalized Picks</a></li>
        </ul>
        <div class="mobile-menu" onclick="toggleMobileMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="chat-container">
            <div class="chat-header">
                <h2>📚 Wiki Assistant</h2>
                <p>Ask me anything about comics!</p>
            </div>
            
            <!-- Quick Prompts -->
            <div class="quick-prompts">
                <button class="quick-prompt" onclick="setQuickPrompt('wiki', 'Who is Spider-Man?')">Who is Spider-Man?</button>
                <button class="quick-prompt" onclick="setQuickPrompt('wiki', 'Tell me about the Infinity Gauntlet')">Infinity Gauntlet</button>
                <button class="quick-prompt" onclick="setQuickPrompt('wiki', 'What is the Marvel Universe?')">Marvel Universe</button>
                <button class="quick-prompt" onclick="setQuickPrompt('wiki', 'Who is Batman?')">Who is Batman?</button>
            </div>
            
            <!-- Chat Messages -->
            <div class="chat-messages" id="wiki-messages">
                <div class="message ai">
                    <p>👋 Hi! I'm your Comic Wiki Assistant. Ask me anything about comic characters, storylines, events, or universes!</p>
                </div>
            </div>
            
            <!-- Chat Input -->
            <div class="chat-input">
                <input type="text" id="wiki-input" placeholder="Ask about a character, event, or storyline...">
                <button id="wiki-send">Send</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>ComicHelper - Powered by <a href="https://ollama.com" target="_blank">Ollama</a></p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
